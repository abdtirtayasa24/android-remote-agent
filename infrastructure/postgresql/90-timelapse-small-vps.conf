# Listen only on local loopback interfaces.
listen_addresses = 'localhost'
port = 5432

# Conservative defaults for a 4 GiB VPS.
max_connections = 30
shared_buffers = 128MB
effective_cache_size = 512MB
work_mem = 4MB
maintenance_work_mem = 64MB

# Store and log server time in UTC.
timezone = 'UTC'
log_timezone = 'UTC'

# New passwords shall use SCRAM.
password_encryption = 'scram-sha-256'
